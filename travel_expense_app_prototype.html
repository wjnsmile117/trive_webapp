<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>旅遊記帳 App</title>
  <style>
    :root {
      --bg: #f4f1ed;
      --panel: #ffffff;
      --panel-soft: #f6f0ea;
      --panel-soft-2: #efe8df;
      --border: #ddd5cc;
      --text: #1f2937;
      --muted: #6b7280;
      --muted-2: #8b8b8b;
      --brand-1: #b7b7a4;
      --brand-2: #a5a58d;
      --brand-3: #cb997e;
      --chip: rgba(255,255,255,.18);
      --shadow: 0 12px 30px rgba(0,0,0,.08);
      --shadow-sm: 0 6px 18px rgba(0,0,0,.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: transparent;
    }

    .shell {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px;
      background: var(--bg);
    }

    .phone {
      overflow: hidden;
      background: linear-gradient(180deg, #faf7f3 0%, #fffdfb 100%);
      border: 1px solid var(--border);
      border-radius: 32px;
      min-height: calc(100vh - 24px);
      box-shadow: 0 18px 40px rgba(0,0,0,.08);
      position: relative;
    }

    .notch {
      width: 80px;
      height: 6px;
      border-radius: 999px;
      background: var(--border);
      margin: 8px auto 0;
    }

    .app {
      padding: 14px 14px 110px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #fff;
      display: grid;
      place-items: center;
      color: #6b5e55;
    }

    .brand-icon {
      background: #ede6de;
      border: 0;
    }

    .title-center {
      text-align: center;
      flex: 1;
    }

    .title-center small {
      display: block;
      font-size: 11px;
      color: var(--muted);
    }

    .title-center h1 {
      margin: 2px 0 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .card {
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow-sm);
    }

    .current-trip {
      margin-top: 12px;
      padding: 14px;
      border-radius: 28px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2), var(--brand-3));
      box-shadow: var(--shadow);
    }

    .current-trip .label,
    .current-trip .sub {
      font-size: 11px;
      color: rgba(255,255,255,.78);
    }

    .current-trip .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-top: 6px;
    }

    .current-trip h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1;
      background: rgba(255,255,255,.18);
      color: inherit;
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .stats-box {
      background: rgba(255,255,255,.15);
      border-radius: 18px;
      padding: 10px;
      backdrop-filter: blur(6px);
    }

    .stats-box .k {
      font-size: 10px;
      color: rgba(255,255,255,.76);
    }

    .stats-box .v {
      margin-top: 3px;
      font-size: 16px;
      font-weight: 700;
    }

    .section-wrap {
      margin-top: 14px;
      border-radius: 28px;
      padding: 12px;
      background: var(--panel-soft-2);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-header h3 {
      margin: 0;
      font-size: 15px;
    }

    .section-header p {
      margin: 2px 0 0;
      font-size: 11px;
      color: var(--muted);
    }

    .btn {
      height: 34px;
      padding: 0 14px;
      border-radius: 16px;
      background: var(--brand-2);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn.outline {
      background: #fff;
      border: 1px solid var(--border);
      color: #5f5f5f;
    }

    .btn.small {
      height: 32px;
      padding: 0 12px;
      font-size: 12px;
    }

    .flight-card {
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(200,182,166,.22);
      padding: 12px;
    }

    .flight-head,
    .flight-route {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .flight-head .mini {
      font-size: 11px;
      color: #6b7280;
      letter-spacing: .16em;
    }

    .flight-airline {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 600;
    }

    .flight-no,
    .flight-time {
      font-size: 11px;
      color: #6b7280;
    }

    .flight-route {
      margin-top: 10px;
      background: rgba(255,255,255,.58);
      padding: 10px 12px;
      border-radius: 18px;
    }

    .airport {
      font-size: 18px;
      font-weight: 700;
    }

    .airport-sub {
      font-size: 10px;
      color: #6b7280;
      margin-top: 2px;
    }

    .tab-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .day-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin: 12px -2px 0;
      padding-inline: 2px;
      scrollbar-width: none;
    }
    .day-strip::-webkit-scrollbar { display: none; }

    .day-chip {
      min-width: 112px;
      padding: 10px 12px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: #fff;
      text-align: left;
      flex: 0 0 auto;
    }

    .day-chip.active {
      background: var(--brand-2);
      color: #fff;
      border-color: transparent;
      box-shadow: var(--shadow-sm);
    }

    .day-chip .mini {
      font-size: 10px;
      color: inherit;
      opacity: .78;
    }

    .day-chip .date {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 700;
    }

    .day-chip .count {
      margin-top: 2px;
      font-size: 10px;
      color: inherit;
      opacity: .78;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .itinerary-card,
    .expense-card,
    .member-card,
    .analytics-card {
      border-radius: 24px;
      background: #fff;
      box-shadow: var(--shadow-sm);
    }

    .itinerary-card {
      padding: 12px;
      border: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .drag-handle {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #94a3b8;
      background: #fff;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .itinerary-main {
      min-width: 0;
      flex: 1;
    }

    .itinerary-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .itinerary-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      margin: 0;
      color: var(--text);
    }

    .muted-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .ticket-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #efe8df;
      color: #7b6254;
      font-size: 10px;
    }

    .expense-card,
    .member-card,
    .analytics-card {
      padding: 14px;
    }

    .expense-head,
    .member-head,
    .top-expense-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .expense-name,
    .member-name,
    .top-expense-name {
      font-size: 15px;
      font-weight: 700;
      margin: 0;
    }

    .expense-sub,
    .member-sub,
    .top-expense-sub {
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
    }

    .amount-foreign {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    .amount-twd {
      margin-top: 3px;
      font-weight: 700;
      font-size: 14px;
      text-align: right;
    }

    .member-avatar {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: #ede6de;
      font-size: 24px;
    }

    .member-row-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      flex: 1;
    }

    .top-expense-row {
      padding: 10px 12px;
      border-radius: 18px;
      background: var(--panel-soft);
    }

    .rank {
      width: 28px;
      height: 28px;
      border-radius: 12px;
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .chart-box {
      height: 180px;
      margin-top: 8px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
    }

    .fake-line,
    .fake-bars,
    .fake-pie {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(246,240,234,.95));
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .fake-line svg,
    .fake-pie svg,
    .fake-bars svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      padding: 8px 16px 16px;
      z-index: 30;
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 6px;
      border-radius: 26px;
      background: rgba(255,255,255,.96);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .nav-item {
      min-height: 52px;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-size: 11px;
      color: var(--muted);
    }

    .nav-item.active {
      background: #e6ded3;
      color: #6b5e55;
    }

    .sheet,
    .dialog {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 40;
    }

    .sheet.show,
    .dialog.show {
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,.28);
    }

    .sheet-panel {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 100%;
      max-width: 420px;
      transform: translateX(-50%);
      background: #fff;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 18px 16px 28px;
      box-shadow: 0 -18px 40px rgba(0,0,0,.12);
    }

    .dialog-panel {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 32px);
      max-width: 388px;
      background: #fff;
      border-radius: 28px;
      padding: 18px 16px 18px;
      box-shadow: 0 24px 50px rgba(0,0,0,.14);
      max-height: 88vh;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #52525b;
      font-weight: 600;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      outline: none;
    }

    .textarea {
      min-height: 100px;
      resize: vertical;
    }

    .preview-box {
      padding: 12px;
      border-radius: 22px;
      background: var(--panel-soft);
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .emoji-btn {
      height: 56px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 24px;
    }

    .emoji-btn.active {
      border-color: var(--brand-2);
      background: #efe8df;
    }

    .hidden { display: none !important; }

    .menu-list {
      display: grid;
      gap: 10px;
    }

    .trip-list-item {
      width: 100%;
      padding: 14px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: #fff;
      text-align: left;
    }

    .trip-list-item.active {
      border-color: #c8b6a6;
      background: #f6f0ea;
    }

    .row-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .screen.hidden-screen {
      display: none;
    }

    .invite-box {
      border-radius: 18px;
      padding: 12px;
      background: var(--panel-soft);
    }

    .dragging {
      opacity: .55;
    }

    @media (max-width: 360px) {
      .analytics-grid { grid-template-columns: 1fr; }
      .form-row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="phone">
      <div class="notch"></div>
      <div class="app">
        <section id="home-screen" class="screen">
          <div class="topbar">
            <button class="icon-btn" id="open-trip-menu" aria-label="打開旅遊項目選單">
              ☰
            </button>
            <div class="title-center">
              <small>手機版正式雛形</small>
              <h1>旅遊記帳 App</h1>
            </div>
            <button class="icon-btn brand-icon" aria-label="品牌圖示">✈️</button>
          </div>

          <section class="current-trip" id="current-trip-card"></section>

          <section id="flight-section" class="section-wrap hidden"></section>
          <section id="itinerary-section" class="hidden"></section>
          <section id="expenses-section" class="hidden"></section>
          <section id="members-section" class="hidden"></section>
          <section id="analytics-section" class="hidden"></section>
        </section>

        <section id="edit-screen" class="screen hidden-screen"></section>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav">
    <div class="bottom-nav-inner" id="bottom-nav-inner"></div>
  </nav>

  <div class="sheet" id="trip-menu-sheet">
    <div class="overlay" data-close="trip-menu-sheet"></div>
    <div class="sheet-panel">
      <h2 class="panel-title">旅遊項目</h2>
      <div class="menu-list" id="trip-menu-list"></div>
      <div style="margin-top:16px;">
        <button class="btn" style="width:100%;" id="open-add-trip-dialog">＋ 新增旅遊項目</button>
      </div>
    </div>
  </div>

  <div class="dialog" id="trip-dialog">
    <div class="overlay" data-close="trip-dialog"></div>
    <div class="dialog-panel">
      <h2 class="panel-title">新增旅遊項目</h2>
      <div class="form-grid">
        <div class="field"><label>旅程名稱</label><input class="input" id="trip-title" /></div>
        <div class="form-row-2">
          <div class="field"><label>開始日期</label><input type="date" class="input" id="trip-start-date" /></div>
          <div class="field"><label>結束日期</label><input type="date" class="input" id="trip-end-date" /></div>
        </div>
        <div class="form-row-2">
          <div class="field">
            <label>幣別</label>
            <select class="select" id="trip-currency">
              <option value="JPY">JPY</option>
              <option value="KRW">KRW</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </div>
          <div class="field"><label>匯率</label><input type="number" class="input" id="trip-fx-rate" value="0.22" /></div>
        </div>
        <button class="btn" id="submit-add-trip">建立旅程</button>
      </div>
    </div>
  </div>

  <div class="sheet" id="ticket-sheet">
    <div class="overlay" data-close="ticket-sheet"></div>
    <div class="sheet-panel">
      <h2 class="panel-title">編輯航班資訊</h2>
      <div id="ticket-form"></div>
      <div style="margin-top:16px;"><button class="btn" style="width:100%;" id="save-ticket-btn">儲存航班</button></div>
    </div>
  </div>

  <div class="sheet" id="day-sheet">
    <div class="overlay" data-close="day-sheet"></div>
    <div class="sheet-panel">
      <h2 class="panel-title">新增日期</h2>
      <div class="form-grid">
        <div class="field"><label>日期</label><input type="date" class="input" id="new-day-date" /></div>
        <div class="preview-box" id="day-preview-box">請選擇日期</div>
        <button class="btn" id="save-day-btn">加入這一天</button>
      </div>
    </div>
  </div>

  <div class="sheet" id="itinerary-sheet">
    <div class="overlay" data-close="itinerary-sheet"></div>
    <div class="sheet-panel">
      <h2 class="panel-title">新增行程卡片</h2>
      <div class="form-grid">
        <div class="field"><label>所在天數</label><select class="select" id="new-itinerary-day"></select></div>
        <div class="field"><label>行程名稱</label><input class="input" id="new-itinerary-title" placeholder="例如：淺草寺" /></div>
        <div class="form-row-2">
          <div class="field"><label>開始時間</label><input type="time" class="input" id="new-itinerary-start" /></div>
          <div class="field"><label>結束時間</label><input type="time" class="input" id="new-itinerary-end" /></div>
        </div>
        <div class="field"><label>地點</label><input class="input" id="new-itinerary-location" placeholder="地點" /></div>
        <div class="field"><label>門票</label><input type="number" class="input" id="new-itinerary-ticket" value="0" /></div>
        <div class="field"><label>備註</label><textarea class="textarea" id="new-itinerary-note" placeholder="備註"></textarea></div>
        <button class="btn" id="save-itinerary-btn">新增行程卡片</button>
      </div>
    </div>
  </div>

  <div class="sheet" id="expense-sheet">
    <div class="overlay" data-close="expense-sheet"></div>
    <div class="sheet-panel">
      <h2 class="panel-title">新增支出</h2>
      <div class="form-grid">
        <div class="field"><label>日期</label><input type="date" class="input" id="expense-date" /></div>
        <div class="field"><label>店名</label><input class="input" id="expense-merchant" /></div>
        <div class="field"><label>品項</label><input class="input" id="expense-item" /></div>
        <div class="field"><label>外幣金額</label><input type="number" class="input" id="expense-foreign" /></div>
        <div class="form-row-2">
          <div class="field"><label>類別</label><select class="select" id="expense-category"></select></div>
          <div class="field"><label>支付方式</label><select class="select" id="expense-payment"></select></div>
        </div>
        <div class="field"><label>旅伴</label><select class="select" id="expense-member"></select></div>
        <div class="field"><label>備註</label><textarea class="textarea" id="expense-note"></textarea></div>
        <button class="btn" id="save-expense-btn">加入支出</button>
      </div>
    </div>
  </div>

  <div class="sheet" id="receipt-sheet">
    <div class="overlay" data-close="receipt-sheet"></div>
    <div class="sheet-panel">
      <h2 class="panel-title">拍照翻譯收據</h2>
      <div class="form-grid">
        <div class="field"><label>上傳收據</label><input type="file" class="input" id="receipt-file" accept="image/*" /></div>
        <div class="preview-box" id="receipt-preview-box">尚未選擇收據</div>

    function getSelectedTrip() {
      return state.trips.find((trip) => trip.id === state.selectedTripId) || state.trips[0];

    function currency(value, code = "TWD") {
      return new Intl.NumberFormat("zh-TW", {
        style: "currency",
        currency: code,
        maximumFractionDigits: code === "JPY" || code === "KRW" ? 0 : 2,
      }).format(Number(value || 0));
    }

    function formatMonthDay(dateStr) {
      if (!dateStr) return "未設定";
      const date = new Date(dateStr);
      const week = ["日", "一", "二", "三", "四", "五", "六"];
      return `${date.getMonth() + 1}/${date.getDate()}（${week[date.getDay()]}）`;
    }

    function formatTimeRange(startTime, endTime) {
      if (!startTime && !endTime) return "未設定時間";
      if (!endTime) return startTime;
      if (!startTime) return endTime;
      return `${startTime} - ${endTime}`;
    }

    function totalTwd(trip) {
      return trip.expenses.reduce((sum, cur) => sum + Number(cur.twdAmount || 0), 0);
    }

    function totalForeign(trip) {
      return trip.expenses.reduce((sum, cur) => sum + Number(cur.foreignAmount || 0), 0);
    }

    function groupedDays(trip) {
      return trip.dayPlans.map((date) => ({
        date,
        items: trip.itinerary.filter((item) => item.dayDate === date),
      }));
    }

    function memberSummary(trip) {
      return trip.members.map((member) => ({
        ...member,
        total: trip.expenses.filter((x) => x.memberId === member.id).reduce((sum, cur) => sum + Number(cur.twdAmount || 0), 0),
      }));
    }

    function topExpenses(trip) {
      return [...trip.expenses].sort((a, b) => Number(b.twdAmount) - Number(a.twdAmount)).slice(0, 10);
    }

    function dailyTrend(trip) {
      const grouped = {};
      trip.expenses.forEach((cur) => {
        grouped[cur.date] = (grouped[cur.date] || 0) + Number(cur.twdAmount || 0);
      });
      return Object.entries(grouped).map(([date, amount]) => ({ date, amount }));
    }

    function categoryStats(trip) {
      const grouped = {};
      trip.expenses.forEach((cur) => {
        grouped[cur.category] = (grouped[cur.category] || 0) + Number(cur.twdAmount || 0);
      });
      return Object.entries(grouped).map(([name, value]) => ({ name, value }));
    }

    function paymentStats(trip) {
      const grouped = {};
      trip.expenses.forEach((cur) => {
        grouped[cur.paymentMethod] = (grouped[cur.paymentMethod] || 0) + Number(cur.twdAmount || 0);
      });
      return Object.entries(grouped).map(([name, amount]) => ({ name, amount }));

    function attachItineraryCardEvents() {

    function attachDragAndDrop() {
      const list = document.getElementById('itinerary-list');
      if (!list) return;

      let draggedId = null;
      let pressTimer = null;
      let allowDrag = false;

      list.querySelectorAll('.itinerary-card').forEach((card) => {
        const handle = card.querySelector('.drag-handle');

        handle.addEventListener('pointerdown', () => {
          pressTimer = setTimeout(() => {
            allowDrag = true;
            card.setAttribute('draggable', 'true');
          }, 180);
        });

        handle.addEventListener('pointerup', () => {
          clearTimeout(pressTimer);
        });

        handle.addEventListener('pointerleave', () => {
          clearTimeout(pressTimer);
        });

        card.addEventListener('dragstart', (e) => {
          if (!allowDrag) {
            e.preventDefault();
            return;
          }
          draggedId = card.dataset.id;
          card.classList.add('dragging');
        });

        card.addEventListener('dragend', () => {
          allowDrag = false;
          card.classList.remove('dragging');
          card.setAttribute('draggable', 'false');
        });

        card.addEventListener('dragover', (e) => {
          e.preventDefault();
        });

        card.addEventListener('drop', (e) => {
          e.preventDefault();
          const targetId = card.dataset.id;
          if (!draggedId || draggedId === targetId) return;
          reorderCurrentDayItems(draggedId, targetId);
        });
      });
    }

    function reorderCurrentDayItems(draggedId, targetId) {
      const trip = getSelectedTrip();
      const dayItems = trip.itinerary.filter((item) => item.dayDate === state.selectedDay);
      const otherItems = trip.itinerary.filter((item) => item.dayDate !== state.selectedDay);
      const oldIndex = dayItems.findIndex((item) => item.id === draggedId);
      const newIndex = dayItems.findIndex((item) => item.id === targetId);
      if (oldIndex < 0 || newIndex < 0) return;
      const moved = dayItems.splice(oldIndex, 1)[0];
      dayItems.splice(newIndex, 0, moved);
      trip.itinerary = [...otherItems, ...dayItems];
      renderItinerarySection();
    }

    function renderLineChart(data) {
      if (!data.length) return '<div class="fake-line"></div>';
      const values = data.map((d) => d.amount);
      const max = Math.max(...values, 1);
      const width = 280;
      const height = 160;
      const stepX = width / Math.max(data.length - 1, 1);
      const points = data.map((d, i) => {
        const x = i * stepX;
        const y = height - (d.amount / max) * 120 - 12;
        return `${x},${y}`;
      }).join(' ');
      return `
        <div class="fake-line">
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
            <polyline fill="none" stroke="#8d9b8a" stroke-width="4" points="${points}" />
          </svg>
        </div>
      `;
    }

    function renderPieChart(data) {
      if (!data.length) return '<div class="fake-pie"></div>';
      let total = data.reduce((s, d) => s + d.value, 0) || 1;
      let start = 0;
      const segments = data.map((d, index) => {
        const size = d.value / total;
        const end = start + size;
        const large = end - start > 0.5 ? 1 : 0;
        const x1 = 100 + 55 * Math.cos(2 * Math.PI * start - Math.PI / 2);
        const y1 = 100 + 55 * Math.sin(2 * Math.PI * start - Math.PI / 2);
        const x2 = 100 + 55 * Math.cos(2 * Math.PI * end - Math.PI / 2);
        const y2 = 100 + 55 * Math.sin(2 * Math.PI * end - Math.PI / 2);
        const path = `M100 100 L${x1} ${y1} A55 55 0 ${large} 1 ${x2} ${y2} Z`;
        start = end;
        return `<path d="${path}" fill="${chartColors[index % chartColors.length]}"></path>`;
      }).join('');
      return `
        <div class="fake-pie">
          <svg viewBox="0 0 200 200">${segments}<circle cx="100" cy="100" r="26" fill="#fff"></circle></svg>
        </div>
      `;
    }

    function renderBarChart(data) {
      if (!data.length) return '<div class="fake-bars"></div>';
      const max = Math.max(...data.map((d) => d.amount), 1);
      const width = 280;
      const height = 160;
      const barWidth = Math.max(26, Math.floor(width / (data.length * 1.8)));
      const gap = Math.floor((width - barWidth * data.length) / (data.length + 1));
      const bars = data.map((d, index) => {
        const h = Math.max(18, (d.amount / max) * 110);
        const x = gap + index * (barWidth + gap);
        const y = height - h - 12;
        return `<rect x="${x}" y="${y}" rx="10" ry="10" width="${barWidth}" height="${h}" fill="#a5a58d"></rect>`;
      }).join('');
      return `
        <div class="fake-bars">
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${bars}</svg>
        </div>
      `;
    }

      render();
    });

    render();
  </script>
